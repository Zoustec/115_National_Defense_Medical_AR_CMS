<svg width="24" height="24" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg" >
  <!-- Red background -->
  <rect width="48" height="32" fill="#FE0000"/>
  
  <!-- Blue canton -->
  <rect width="24" height="16" fill="#000095"/>
  
  <!-- White sun -->
  <g transform="translate(12,8)">
    <!-- 12 rays -->
    <g fill="#FFFFFF">
      <polygon points="0,-6 1,-2 0,-3 -1,-2"/>
      <polygon points="6,0 2,1 3,0 2,-1"/>
      <polygon points="0,6 1,2 0,3 -1,2"/>
      <polygon points="-6,0 -2,1 -3,0 -2,-1"/>
      <polygon points="4.2,-4.2 1.5,-1.5 2.1,-2.1 1.5,-2.7"/>
      <polygon points="4.2,4.2 1.5,1.5 2.1,2.1 1.5,2.7"/>
      <polygon points="-4.2,4.2 -1.5,1.5 -2.1,2.1 -1.5,2.7"/>
      <polygon points="-4.2,-4.2 -1.5,-1.5 -2.1,-2.1 -1.5,-2.7"/>
    </g>
    
    <!-- Center circle -->
    <circle r="3" fill="#FFFFFF"/>
  </g>
</svg>